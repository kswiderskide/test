<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Kierowcy</title>
  
  <!-- PLIK MANIFESTU (Odpowiada za nazwę, ikonę i pełny ekran) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    /* Usuwamy wszystkie marginesy, żeby Google Apps Script wypełniło 100% ekranu telefonu */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a1a;
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- TUTAJ WKLEJ TEN DŁUGI LINK SKOPIOWANY Z KROKU 1 -->
  <iframe src="TUTAJ_WKLEJ_SWÓJ_NOWY_LINK_Z_GOOGLE_APPS_SCRIPT"></iframe>

  <script>
    // Rejestracja Service Workera (Wymusza na telefonie pokazanie paska instalacji)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker zarejestrowany!'))
          .catch(err => console.log('Błąd rejestracji Service Workera:', err));
      });
    }
  </script>

</body>
</html>
